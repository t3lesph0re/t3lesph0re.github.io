<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 450" role="img" aria-labelledby="esc8-title esc8-desc">
  <title id="esc8-title">ESC8 attack flow</title>
  <desc id="esc8-desc">The ESC8 attack chain. PetitPotam coerces the DC to authenticate to the attacker VDI over SMB. ntlmrelayx with StreamDivert captures that auth and relays it to the subCA Web Enrollment endpoint. The CA issues a certificate in the name of the DC machine account. Rubeus converts the certificate to a TGT and extracts the NT hash. secretsdump performs DCSync.</desc>

  <defs>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2d6a4f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .box-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; fill: #1a1a19; }
    .box-sub   { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #666; }
    .arr-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1a1a19; }
    .container { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; fill: #2d6a4f; letter-spacing: 0.1em; }
    .legend    { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #666; }
  </style>

  <!-- attacker VDI container -->
  <rect x="30" y="30" width="620" height="120" rx="10" fill="rgba(45, 106, 79, 0.04)" stroke="#2d6a4f" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="container" x="48" y="50">ATTACKER VDI</text>

  <!-- PetitPotam -->
  <g>
    <rect x="60" y="70" width="160" height="60" rx="6" fill="#d8e7df" stroke="#2d6a4f" stroke-width="0.5"/>
    <text class="box-title" x="140" y="97" text-anchor="middle">PetitPotam</text>
    <text class="box-sub" x="140" y="114" text-anchor="middle">EFSRPC coerce</text>
  </g>

  <!-- ntlmrelayx -->
  <g>
    <rect x="260" y="70" width="160" height="60" rx="6" fill="#d8e7df" stroke="#2d6a4f" stroke-width="0.5"/>
    <text class="box-title" x="340" y="97" text-anchor="middle">ntlmrelayx</text>
    <text class="box-sub" x="340" y="114" text-anchor="middle">+ StreamDivert</text>
  </g>

  <!-- Rubeus -->
  <g>
    <rect x="460" y="70" width="160" height="60" rx="6" fill="#d8e7df" stroke="#2d6a4f" stroke-width="0.5"/>
    <text class="box-title" x="540" y="97" text-anchor="middle">Rubeus</text>
    <text class="box-sub" x="540" y="114" text-anchor="middle">PKINIT / U2U</text>
  </g>

  <!-- Domain Controller -->
  <g>
    <rect x="60" y="230" width="200" height="56" rx="6" fill="#f0efed" stroke="#888" stroke-width="0.5"/>
    <text class="box-title" x="160" y="254" text-anchor="middle">Domain Controller</text>
    <text class="box-sub" x="160" y="272" text-anchor="middle">$DC machine account</text>
  </g>

  <!-- subCA -->
  <g>
    <rect x="420" y="230" width="200" height="56" rx="6" fill="#f0efed" stroke="#888" stroke-width="0.5"/>
    <text class="box-title" x="520" y="254" text-anchor="middle">subCA</text>
    <text class="box-sub" x="520" y="272" text-anchor="middle">/certsrv/ over HTTP</text>
  </g>

  <!-- 1. PetitPotam coerces DC (straight down, left side of DC) -->
  <path d="M 120 130 L 120 228" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr-gray)"/>
  <text class="arr-label" x="128" y="185">1. coerce</text>

  <!-- 2. DC auths to ntlmrelayx (straight up from right side of DC to left side of ntlmrelayx) -->
  <path d="M 240 228 L 240 170 L 290 170 L 290 132" fill="none" stroke="#888" stroke-width="1.3" marker-end="url(#arr-gray)"/>
  <text class="arr-label" x="248" y="200">2. NTLM/SMB</text>

  <!-- 3. ntlmrelayx → subCA (down-right, clean elbow) -->
  <path d="M 390 132 L 390 170 L 460 170 L 460 228" fill="none" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text class="arr-label" x="399" y="165">3. relay</text>

  <!-- 4. subCA → Rubeus (straight up on right side) -->
  <path d="M 580 228 L 580 132" fill="none" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text class="arr-label" x="588" y="185">4. cert</text>

  <!-- 5. Rubeus → DC: cert-based PKINIT. Routes down right, across bottom, up into DC. -->
  <path d="M 540 132 L 540 200 L 660 200 L 660 320 L 220 320 L 220 288" fill="none" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
  <text class="arr-label" x="440" y="314" text-anchor="middle">5. cert → PKINIT → NT hash</text>

  <!-- DCSync outcome box -->
  <rect x="180" y="355" width="320" height="50" rx="6" fill="rgba(45, 106, 79, 0.1)" stroke="#2d6a4f" stroke-width="0.8"/>
  <text class="box-title" x="340" y="379" text-anchor="middle">secretsdump → NTDS.dit</text>
  <text class="box-sub" x="340" y="395" text-anchor="middle">DCSync with $DC$ hash</text>

  <!-- 6. DC → DCSync (down from DC to outcome box) -->
  <path d="M 100 286 L 100 335 L 260 335 L 260 353" fill="none" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text class="arr-label" x="108" y="329">6. DRSUAPI</text>

  <!-- legend -->
  <g transform="translate(90, 430)">
    <line x1="0" y1="6" x2="28" y2="6" stroke="#888" stroke-width="1.3" marker-end="url(#arr-gray)"/>
    <text class="legend" x="36" y="10">victim traffic</text>

    <line x1="170" y1="6" x2="198" y2="6" stroke="#2d6a4f" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text class="legend" x="206" y="10">attacker flow</text>

    <line x1="320" y1="6" x2="348" y2="6" stroke="#2d6a4f" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
    <text class="legend" x="356" y="10">cert-based (PKINIT)</text>
  </g>
</svg>
