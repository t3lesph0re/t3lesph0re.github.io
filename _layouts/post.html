---
layout: default
---
<div class="post">
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">&larr; back</a>
  </nav>

  <article>
    <h1 class="post-title">{{ page.title }}</h1>

    <div class="post-meta">
      <span class="post-date-detail">{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.category %}
        <a class="post-category" href="{{ '/category/' | append: page.category | append: '/' | relative_url }}">{{ page.category }}</a>
      {% endif %}
    </div>

    {{ content }}
  </article>
</div>

<script>
  // Wrap every figure image in an anchor that opens the full-size source
  // in a new tab. Pure progressive enhancement - if JS is off, images
  // still display, just aren't clickable.
  document.querySelectorAll('.post article figure img').forEach(function (img) {
    if (img.parentElement.tagName === 'A') return; // already wrapped
    var link = document.createElement('a');
    link.href = img.src;
    link.target = '_blank';
    link.rel = 'noopener';
    link.className = 'figure-link';
    img.parentNode.insertBefore(link, img);
    link.appendChild(img);
  });
</script>
