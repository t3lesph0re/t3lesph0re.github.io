---
layout: default
---
<div class="post">
  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">&larr; back</a>
  </nav>

  <article>
    <h1 class="post-title">{{ page.title }}</h1>

    <div class="post-meta">
      <span class="post-date-detail">{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.category %}
        <a class="post-category" href="{{ '/category/' | append: page.category | append: '/' | relative_url }}">{{ page.category }}</a>
      {% endif %}
    </div>

    {{ content }}
  </article>
</div>

<!-- Lightbox overlay - hidden by default, shown when a figure image is clicked -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <img id="lightbox-img" alt="">
</div>

<script>
(function () {
  var lb  = document.getElementById('lightbox');
  var lbI = document.getElementById('lightbox-img');
  if (!lb || !lbI) return;

  function open(src, alt) {
    lbI.src = src;
    lbI.alt = alt || '';
    lb.classList.add('is-open');
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('is-open');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    setTimeout(function () { lbI.src = ''; }, 200);
  }

  document.querySelectorAll('.post article figure img').forEach(function (img) {
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function () {
      open(img.currentSrc || img.src, img.alt);
    });
  });

  lb.addEventListener('click', close);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && lb.classList.contains('is-open')) close();
  });
})();
</script>

<!-- Heading anchors: adds a hover-reveal # to each section header so it can be linked directly -->
<script>
(function () {
  var heads = document.querySelectorAll('.post article h2, .post article h3');
  heads.forEach(function (h) {
    var id = h.id;
    if (!id) {
      id = h.textContent.trim().toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-');
      h.id = id;
    }
    var a = document.createElement('a');
    a.className = 'header-anchor';
    a.href = '#' + id;
    a.textContent = '#';
    a.setAttribute('aria-label', 'Link to this section');
    h.insertBefore(a, h.firstChild);
  });
})();
</script>
